<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>EXAM GRIND — Progress Tracker</title>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Mono:wght@400;500&family=Instrument+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #0a0a0a;
    --surface: #111111;
    --surface2: #1a1a1a;
    --border: #222222;
    --maths: #f0c040;
    --physics: #40a8f0;
    --chem: #50e0a0;
    --text: #f0f0f0;
    --muted: #666;
    --exam-date: #ff6b35;
  }
  * { margin:0; padding:0; box-sizing:border-box; }
  body { background:var(--bg); color:var(--text); font-family:'Instrument Sans',sans-serif; min-height:100vh; overflow-x:hidden; }
  body::before { content:''; position:fixed; inset:0; background-image:url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='0.03'/%3E%3C/svg%3E"); pointer-events:none; z-index:0; opacity:0.4; }
  .container { max-width:1100px; margin:0 auto; padding:0 24px; position:relative; z-index:1; }

  /* HEADER */
  header { border-bottom:1px solid var(--border); padding:24px 0 18px; position:sticky; top:0; background:rgba(10,10,10,0.96); backdrop-filter:blur(12px); z-index:100; }
  .header-inner { display:flex; justify-content:space-between; align-items:center; flex-wrap:wrap; gap:12px; }
  .logo { font-family:'Bebas Neue',sans-serif; font-size:2rem; letter-spacing:3px; }
  .logo span { color:var(--maths); }
  .countdown-pill { background:var(--surface2); border:1px solid var(--exam-date); border-radius:100px; padding:8px 20px; font-family:'DM Mono',monospace; font-size:0.8rem; color:var(--exam-date); display:flex; align-items:center; gap:8px; }
  .countdown-pill .dot { width:6px; height:6px; background:var(--exam-date); border-radius:50%; animation:pulse 1.5s infinite; }
  @keyframes pulse { 0%,100%{opacity:1;transform:scale(1)} 50%{opacity:0.4;transform:scale(0.8)} }

  /* STATS */
  .overall-section { padding:36px 0 28px; border-bottom:1px solid var(--border); }
  .section-label { font-family:'DM Mono',monospace; font-size:0.7rem; letter-spacing:3px; color:var(--muted); text-transform:uppercase; margin-bottom:18px; }
  .stats-grid { display:grid; grid-template-columns:repeat(auto-fit,minmax(150px,1fr)); gap:14px; margin-bottom:24px; }
  .stat-card { background:var(--surface); border:1px solid var(--border); border-radius:12px; padding:18px; position:relative; overflow:hidden; }
  .stat-card::before { content:''; position:absolute; top:0; left:0; right:0; height:2px; }
  .stat-card.maths::before { background:var(--maths); }
  .stat-card.physics::before { background:var(--physics); }
  .stat-card.chem::before { background:var(--chem); }
  .stat-card.overall::before { background:linear-gradient(90deg,var(--maths),var(--physics),var(--chem)); }
  .stat-value { font-family:'Bebas Neue',sans-serif; font-size:2.6rem; line-height:1; margin-bottom:4px; }
  .stat-card.maths .stat-value { color:var(--maths); }
  .stat-card.physics .stat-value { color:var(--physics); }
  .stat-card.chem .stat-value { color:var(--chem); }
  .overall-bar { background:var(--surface); border:1px solid var(--border); border-radius:12px; padding:18px 22px; display:flex; align-items:center; gap:18px; }
  .bar-label { font-family:'DM Mono',monospace; font-size:0.75rem; color:var(--muted); white-space:nowrap; }
  .bar-track { flex:1; height:8px; background:var(--border); border-radius:100px; overflow:hidden; }
  .bar-fill { height:100%; border-radius:100px; background:linear-gradient(90deg,var(--maths),var(--physics),var(--chem)); transition:width 0.8s cubic-bezier(0.4,0,0.2,1); }
  .bar-pct { font-family:'Bebas Neue',sans-serif; font-size:1.4rem; }
  .stat-label { font-size:0.75rem; color:var(--muted); font-weight:500; }

  /* TABS */
  .week-section { padding:28px 0; }
  .tabs { display:flex; gap:8px; margin-bottom:24px; flex-wrap:wrap; }
  .tab { font-family:'DM Mono',monospace; font-size:0.72rem; letter-spacing:1px; padding:7px 16px; border-radius:100px; border:1px solid var(--border); background:transparent; color:var(--muted); cursor:pointer; transition:all 0.2s; }
  .tab:hover { border-color:#444; color:var(--text); }
  .tab.active { background:var(--text); color:var(--bg); border-color:var(--text); font-weight:600; }
  .week-panel { display:none; }
  .week-panel.active { display:block; }

  /* MOTIVE BAR */
  .motive-bar { background:var(--surface); border:1px solid var(--border); border-left:3px solid var(--maths); border-radius:10px; padding:14px 18px; margin-bottom:24px; font-size:0.85rem; color:#aaa; font-style:italic; line-height:1.5; }
  .motive-bar strong { color:var(--maths); font-style:normal; }

  /* DAY CARDS */
  .days-grid { display:flex; flex-direction:column; gap:10px; }
  .day-card { background:var(--surface); border:1px solid var(--border); border-radius:14px; overflow:hidden; transition:border-color 0.2s; }
  .day-card:hover { border-color:#333; }
  .day-card.today { border-color:var(--maths); }
  .day-card.review-day { border-color:#333; }
  .day-header { display:flex; align-items:center; justify-content:space-between; padding:14px 18px; cursor:pointer; gap:14px; }
  .day-left { display:flex; align-items:center; gap:14px; flex:1; min-width:0; }
  .day-num { font-family:'Bebas Neue',sans-serif; font-size:1.7rem; color:var(--muted); min-width:38px; line-height:1; }
  .day-card.today .day-num { color:var(--maths); }
  .day-card.review-day .day-num { color:#a78bfa; }
  .day-info { flex:1; min-width:0; }
  .day-name { font-weight:600; font-size:0.88rem; display:flex; align-items:center; gap:8px; flex-wrap:wrap; }
  .day-date { font-size:0.72rem; color:var(--muted); font-family:'DM Mono',monospace; margin-top:2px; }
  .day-subjects { display:flex; gap:5px; flex-wrap:wrap; margin-top:5px; }
  .subj-tag { font-size:0.62rem; font-family:'DM Mono',monospace; padding:2px 8px; border-radius:100px; font-weight:500; letter-spacing:0.5px; }
  .subj-tag.m { background:rgba(240,192,64,0.15); color:var(--maths); }
  .subj-tag.p { background:rgba(64,168,240,0.15); color:var(--physics); }
  .subj-tag.c { background:rgba(80,224,160,0.15); color:var(--chem); }
  .subj-tag.quiz { background:rgba(167,139,250,0.15); color:#a78bfa; }
  .day-actions { display:flex; align-items:center; gap:10px; }
  .complete-btn { width:30px; height:30px; border-radius:50%; border:2px solid var(--border); background:transparent; cursor:pointer; display:flex; align-items:center; justify-content:center; transition:all 0.2s; flex-shrink:0; }
  .complete-btn:hover { border-color:var(--chem); }
  .complete-btn.done { background:var(--chem); border-color:var(--chem); }
  .complete-btn svg { width:13px; height:13px; }
  .chevron { color:var(--muted); transition:transform 0.3s; font-size:0.9rem; flex-shrink:0; }
  .day-card.open .chevron { transform:rotate(180deg); }

  /* DAY TASKS */
  .day-tasks { display:none; padding:0 18px 18px; border-top:1px solid var(--border); }
  .day-card.open .day-tasks { display:block; }
  .tasks-grid { display:grid; grid-template-columns:repeat(auto-fit,minmax(260px,1fr)); gap:10px; margin-top:14px; }
  .subject-block { background:var(--surface2); border-radius:10px; padding:14px; }
  .subject-block-title { font-family:'DM Mono',monospace; font-size:0.68rem; letter-spacing:2px; text-transform:uppercase; margin-bottom:10px; padding-bottom:7px; border-bottom:1px solid var(--border); }
  .subject-block-title.m { color:var(--maths); }
  .subject-block-title.p { color:var(--physics); }
  .subject-block-title.c { color:var(--chem); }
  .task-item { display:flex; align-items:flex-start; gap:8px; padding:5px 0; font-size:0.8rem; line-height:1.4; color:#ccc; }
  .task-check { width:15px; height:15px; border-radius:4px; border:1.5px solid var(--border); background:transparent; cursor:pointer; flex-shrink:0; margin-top:2px; transition:all 0.15s; appearance:none; -webkit-appearance:none; position:relative; }
  .task-check:checked { background:var(--chem); border-color:var(--chem); }
  .task-check:checked::after { content:'✓'; position:absolute; top:-1px; left:1px; font-size:10px; color:#000; font-weight:700; }
  .task-text.done { text-decoration:line-through; color:var(--muted); }

  /* NOTES */
  .day-notes { margin-top:10px; }
  .notes-label { font-size:0.68rem; color:var(--muted); font-family:'DM Mono',monospace; letter-spacing:1px; margin-bottom:5px; }
  .notes-input { width:100%; background:var(--surface2); border:1px solid var(--border); border-radius:8px; padding:9px 11px; font-family:'Instrument Sans',sans-serif; font-size:0.8rem; color:var(--text); resize:vertical; min-height:56px; transition:border-color 0.2s; }
  .notes-input:focus { outline:none; border-color:#444; }
  .notes-input::placeholder { color:var(--muted); }

  /* BADGES */
  .today-badge { font-family:'DM Mono',monospace; font-size:0.58rem; background:var(--maths); color:#000; padding:2px 7px; border-radius:100px; font-weight:700; letter-spacing:1px; }
  .review-badge { font-family:'DM Mono',monospace; font-size:0.58rem; background:#a78bfa; color:#000; padding:2px 7px; border-radius:100px; font-weight:700; letter-spacing:1px; }

  /* ============================
     QUIZ SECTION
  ============================ */
  .quiz-section { margin-top:16px; background:linear-gradient(135deg,rgba(167,139,250,0.06),rgba(167,139,250,0.02)); border:1px solid rgba(167,139,250,0.25); border-radius:12px; padding:20px; }
  .quiz-header { display:flex; align-items:center; justify-content:space-between; flex-wrap:wrap; gap:12px; margin-bottom:16px; }
  .quiz-title { font-family:'Bebas Neue',sans-serif; font-size:1.4rem; letter-spacing:2px; color:#a78bfa; }
  .quiz-subtitle { font-size:0.75rem; color:var(--muted); margin-top:2px; font-family:'DM Mono',monospace; }
  .start-quiz-btn { font-family:'DM Mono',monospace; font-size:0.75rem; letter-spacing:1px; background:#a78bfa; color:#000; border:none; border-radius:100px; padding:10px 22px; cursor:pointer; font-weight:600; transition:all 0.2s; white-space:nowrap; }
  .start-quiz-btn:hover { background:#c4b5fd; transform:translateY(-1px); }
  .start-quiz-btn:disabled { background:#333; color:var(--muted); cursor:not-allowed; transform:none; }

  /* QUIZ MODAL */
  .quiz-modal { display:none; position:fixed; inset:0; background:rgba(0,0,0,0.92); z-index:999; overflow-y:auto; padding:24px; }
  .quiz-modal.open { display:flex; align-items:flex-start; justify-content:center; }
  .quiz-box { background:var(--surface); border:1px solid rgba(167,139,250,0.3); border-radius:20px; width:100%; max-width:700px; margin:auto; padding:32px; }
  .quiz-box-header { display:flex; justify-content:space-between; align-items:center; margin-bottom:24px; }
  .quiz-box-title { font-family:'Bebas Neue',sans-serif; font-size:1.8rem; letter-spacing:2px; color:#a78bfa; }
  .close-quiz { background:transparent; border:1px solid var(--border); color:var(--muted); border-radius:100px; padding:6px 14px; cursor:pointer; font-family:'DM Mono',monospace; font-size:0.72rem; transition:all 0.2s; }
  .close-quiz:hover { border-color:#555; color:var(--text); }

  /* LOADING */
  .quiz-loading { text-align:center; padding:48px 0; }
  .spinner { width:40px; height:40px; border:3px solid var(--border); border-top-color:#a78bfa; border-radius:50%; animation:spin 0.8s linear infinite; margin:0 auto 16px; }
  @keyframes spin { to { transform:rotate(360deg); } }
  .loading-text { font-family:'DM Mono',monospace; font-size:0.8rem; color:var(--muted); }

  /* QUESTION */
  .quiz-progress-bar { height:3px; background:var(--border); border-radius:100px; margin-bottom:24px; overflow:hidden; }
  .quiz-progress-fill { height:100%; background:#a78bfa; border-radius:100px; transition:width 0.4s ease; }
  .quiz-meta { font-family:'DM Mono',monospace; font-size:0.7rem; color:var(--muted); margin-bottom:12px; display:flex; justify-content:space-between; }
  .quiz-subject-tag { padding:2px 10px; border-radius:100px; font-size:0.65rem; font-weight:600; }
  .quiz-subject-tag.Maths { background:rgba(240,192,64,0.2); color:var(--maths); }
  .quiz-subject-tag.Physics { background:rgba(64,168,240,0.2); color:var(--physics); }
  .quiz-subject-tag.Chemistry { background:rgba(80,224,160,0.2); color:var(--chem); }
  .question-text { font-size:1rem; font-weight:600; line-height:1.5; margin-bottom:20px; color:var(--text); }
  .options-grid { display:flex; flex-direction:column; gap:8px; margin-bottom:20px; }
  .option-btn { background:var(--surface2); border:1px solid var(--border); border-radius:10px; padding:12px 16px; text-align:left; color:var(--text); cursor:pointer; font-size:0.85rem; font-family:'Instrument Sans',sans-serif; transition:all 0.2s; line-height:1.4; }
  .option-btn:hover:not(:disabled) { border-color:#a78bfa; background:rgba(167,139,250,0.08); }
  .option-btn.correct { background:rgba(80,224,160,0.15); border-color:var(--chem); color:var(--chem); }
  .option-btn.wrong { background:rgba(255,68,68,0.1); border-color:#ff4444; color:#ff6666; }
  .option-btn.reveal { background:rgba(80,224,160,0.08); border-color:rgba(80,224,160,0.4); color:var(--chem); }
  .option-btn:disabled { cursor:default; }
  .explanation { background:var(--surface2); border-left:3px solid #a78bfa; border-radius:0 8px 8px 0; padding:12px 14px; font-size:0.82rem; color:#bbb; line-height:1.5; margin-bottom:16px; }
  .explanation strong { color:#a78bfa; }
  .next-btn { font-family:'DM Mono',monospace; font-size:0.75rem; letter-spacing:1px; background:#a78bfa; color:#000; border:none; border-radius:100px; padding:10px 24px; cursor:pointer; font-weight:600; transition:all 0.2s; }
  .next-btn:hover { background:#c4b5fd; }

  /* RESULTS */
  .quiz-results { text-align:center; padding:16px 0; }
  .result-score { font-family:'Bebas Neue',sans-serif; font-size:5rem; line-height:1; margin-bottom:8px; }
  .result-label { font-family:'DM Mono',monospace; font-size:0.8rem; color:var(--muted); letter-spacing:2px; margin-bottom:24px; }
  .result-breakdown { display:grid; grid-template-columns:repeat(3,1fr); gap:10px; margin-bottom:24px; }
  .result-sub { background:var(--surface2); border-radius:10px; padding:14px; }
  .result-sub-score { font-family:'Bebas Neue',sans-serif; font-size:1.6rem; }
  .result-sub-score.m { color:var(--maths); }
  .result-sub-score.p { color:var(--physics); }
  .result-sub-score.c { color:var(--chem); }
  .result-sub-label { font-size:0.7rem; color:var(--muted); font-family:'DM Mono',monospace; }
  .result-msg { font-size:0.9rem; color:#bbb; margin-bottom:24px; line-height:1.5; }
  .retake-btn { font-family:'DM Mono',monospace; font-size:0.75rem; letter-spacing:1px; background:transparent; color:#a78bfa; border:1px solid #a78bfa; border-radius:100px; padding:10px 24px; cursor:pointer; font-weight:600; transition:all 0.2s; margin-right:10px; }
  .retake-btn:hover { background:rgba(167,139,250,0.1); }

  /* QUIZ HISTORY */
  .quiz-history { margin-top:12px; }
  .quiz-history-title { font-family:'DM Mono',monospace; font-size:0.68rem; letter-spacing:2px; color:var(--muted); text-transform:uppercase; margin-bottom:8px; }
  .quiz-attempt { display:flex; justify-content:space-between; align-items:center; padding:8px 12px; background:var(--surface2); border-radius:8px; margin-bottom:6px; font-size:0.78rem; }
  .attempt-score { font-family:'Bebas Neue',sans-serif; font-size:1.1rem; color:#a78bfa; }
  .attempt-date { font-family:'DM Mono',monospace; font-size:0.65rem; color:var(--muted); }

  /* SCROLLBAR */
  ::-webkit-scrollbar { width:4px; }
  ::-webkit-scrollbar-track { background:var(--bg); }
  ::-webkit-scrollbar-thumb { background:var(--border); border-radius:2px; }

  footer { border-top:1px solid var(--border); padding:20px 0; text-align:center; font-family:'DM Mono',monospace; font-size:0.68rem; color:var(--muted); letter-spacing:1px; }

  @media(max-width:600px) {
    .logo { font-size:1.5rem; }
    .stat-value { font-size:2rem; }
    .tasks-grid { grid-template-columns:1fr; }
    .result-breakdown { grid-template-columns:repeat(3,1fr); }
    .quiz-box { padding:20px; }
  }
</style>
</head>
<body>

<header>
  <div class="container">
    <div class="header-inner">
      <div class="logo">EXAM<span>GRIND</span></div>
      <div class="countdown-pill">
        <span class="dot"></span>
        <span id="countdown-text">Loading...</span>
      </div>
    </div>
  </div>
</header>

<div class="container">
  <section class="overall-section">
    <div class="section-label">// Overall Progress</div>
    <div class="stats-grid">
      <div class="stat-card maths"><div class="stat-value" id="maths-pct">0%</div><div class="stat-label">Maths (80 marks)</div></div>
      <div class="stat-card physics"><div class="stat-value" id="physics-pct">0%</div><div class="stat-label">Physics (70 marks)</div></div>
      <div class="stat-card chem"><div class="stat-value" id="chem-pct">0%</div><div class="stat-label">Chemistry (70 marks)</div></div>
      <div class="stat-card overall"><div class="stat-value" id="overall-pct">0/56</div><div class="stat-label">Days Completed</div></div>
    </div>
    <div class="overall-bar">
      <div class="bar-label">JOURNEY</div>
      <div class="bar-track"><div class="bar-fill" id="total-bar" style="width:0%"></div></div>
      <div class="bar-pct" id="total-pct">0%</div>
    </div>
  </section>

  <section class="week-section">
    <div class="section-label">// Weekly Breakdown</div>
    <div class="tabs" id="tabs"></div>
    <div id="week-panels"></div>
  </section>
</div>

<footer>
  <div class="container">EXAM DATE: 15 JULY 2026 &nbsp;·&nbsp; TARGET: 80/80 + 70/70 + 70/70 &nbsp;·&nbsp; YOU GOT THIS BRO 💪</div>
</footer>

<!-- QUIZ MODAL -->
<div class="quiz-modal" id="quizModal">
  <div class="quiz-box">
    <div class="quiz-box-header">
      <div class="quiz-box-title" id="quizModalTitle">WEEK REVIEW QUIZ</div>
      <button class="close-quiz" onclick="closeQuiz()">✕ CLOSE</button>
    </div>
    <div id="quizContent"></div>
  </div>
</div>

<script>
// ============================================================
// WEEK DATA
// ============================================================
const EXAM_DATE = new Date('2026-07-15T00:00:00');

const weeks = [
  {
    title:"WEEK 1", focus:"Foundation — Learn from scratch, no rush",
    topics: {
      m:["Relations and Functions","Inverse Trigonometric Functions","Matrices","Determinants","Continuity and Differentiability","Derivatives"],
      p:["Electric Charges and Fields","Electrostatic Potential and Capacitance","Current Electricity","Moving Charges and Magnetism"],
      c:["Basic Concepts of Chemistry","Mole concept and Stoichiometry","Structure of Atom","Periodic Table Trends","Chemical Bonding"]
    },
    days:[
      {name:"Day 1",date:"Mon May 19",tasks:{m:["Relations & Functions: types — reflexive, symmetric, transitive","One-one and onto functions with examples","Do 10 practice problems"],p:["Electric Charges & Fields: Coulomb's law","Electric field lines and superposition","Solve 5 numericals"],c:["Mole concept and molar mass","Stoichiometry basics","Laws of chemical combination"]}},
      {name:"Day 2",date:"Tue May 20",tasks:{m:["Inverse Trig Functions: domain and range","Principal value branch","Graphs of sin⁻¹, cos⁻¹, tan⁻¹"],p:["Electrostatic Potential & Capacitance","Electric potential energy","Capacitors in series and parallel"],c:["Empirical and molecular formula","Percentage composition","Solve 10 stoichiometry problems"]}},
      {name:"Day 3",date:"Wed May 21",tasks:{m:["Matrices: types, addition, multiplication","Transpose and properties","Do NCERT exercise 3.1 & 3.2"],p:["Gauss's Law and applications","Conductors in electric field","Revision of Unit 1 so far"],c:["Structure of Atom: Bohr's model","Quantum numbers explained","Shapes of orbitals s, p, d"]}},
      {name:"Day 4",date:"Thu May 22",tasks:{m:["Determinants: properties and cofactors","Inverse of a matrix","Solve NCERT examples"],p:["Current Electricity: Ohm's law, resistivity","Kirchhoff's laws (KVL & KCL)","Series and parallel circuits"],c:["Electronic configuration: Aufbau principle","Hund's rule and Pauli exclusion","Write configs of first 30 elements"]}},
      {name:"Day 5",date:"Fri May 23",tasks:{m:["Continuity & Differentiability: limits review","Continuity at a point and interval","Chain rule derivation"],p:["Wheatstone bridge and potentiometer","Resistance and temperature","5 numericals on circuits"],c:["Periodic table: trends in ionization energy","Electronegativity and atomic radius","Periodicity patterns"]}},
      {name:"Day 6",date:"Sat May 24",tasks:{m:["Derivatives: product rule, quotient rule","Implicit differentiation","15 derivative practice problems"],p:["Moving Charges: Biot-Savart law","Ampere's circuital law","Force on current-carrying conductor"],c:["Chemical Bonding: ionic and covalent","VSEPR theory and shapes","Polarity of molecules"]}},
      {name:"Day 7 — REVIEW",date:"Sun May 25",isReview:true,tasks:{m:["Redo all wrong problems from Week 1","Make a formula sheet","Test yourself without notes"],p:["Write all formulas on one page","Explain Gauss's law in your own words","Revise numericals you struggled with"],c:["Summary sheet: all reactions and definitions","Recite periodic trends from memory","Quick quiz yourself"]}}
    ]
  },
  {
    title:"WEEK 2", focus:"Build deeper — Calculus, Magnetism, Thermodynamics",

let state = {};
try { state = JSON.parse(localStorage.getItem('examgrind_v2') || '{}'); } catch(e) { state = {}; }
function save() { try { localStorage.setItem('examgrind_v2', JSON.stringify(state)); } catch(e){} }
const gk = (w,d,s,t) => `w${w}_d${d}_${s}_t${t}`;
const dk = (w,d) => `w${w}_d${d}_done`;
const nk = (w,d) => `w${w}_d${d}_note`;
const qk = (w) => `w${w}_quiz`;

// ============================================================
// COUNTDOWN
// ============================================================
function updateCountdown() {
  const diff = EXAM_DATE - new Date();
  if(diff <= 0) { document.getElementById('countdown-text').textContent = 'EXAM DAY! 🔥'; return; }
  const d = Math.floor(diff/86400000), h = Math.floor((diff%86400000)/3600000);
  document.getElementById('countdown-text').textContent = `${d}d ${h}h to Exam`;
}

// ============================================================
// STATS
// ============================================================
function calcStats() {
  let tot=0,done=0,mT=0,mD=0,pT=0,pD=0,cT=0,cD=0,daysDone=0;
  weeks.forEach((w,wi)=>w.days.forEach((d,di)=>{
    if(state[dk(wi,di)]) daysDone++;
    ['m','p','c'].forEach(s=>(d.tasks[s]||[]).forEach((_,ti)=>{
      tot++; if(s==='m')mT++; if(s==='p')pT++; if(s==='c')cT++;
      if(state[gk(wi,di,s,ti)]){done++;if(s==='m')mD++;if(s==='p')pD++;if(s==='c')cD++;}
    }));
  }));
  const pct=v=>Math.round(v*100)+'%';
  document.getElementById('maths-pct').textContent = pct(mT?mD/mT:0);
  document.getElementById('physics-pct').textContent = pct(pT?pD/pT:0);
  document.getElementById('chem-pct').textContent = pct(cT?cD/cT:0);
  document.getElementById('overall-pct').textContent = `${daysDone}/56`;
  const tp = tot?Math.round(done/tot*100):0;
  document.getElementById('total-pct').textContent = tp+'%';
  document.getElementById('total-bar').style.width = tp+'%';
}

// RENDER
// ============================================================
const LABELS = {m:'MATHS',p:'PHYSICS',c:'CHEMISTRY'};
let currentWeek = 0;

function isToday(ds) {
  const parts = ds.split(' ');
  const months = {Jan:0,Feb:1,Mar:2,Apr:3,May:4,Jun:5,Jul:6,Aug:7,Sep:8,Oct:9,Nov:10,Dec:11};
  const d = new Date(2026, months[parts[1]], parseInt(parts[2]));
  const t = new Date(); t.setHours(0,0,0,0);
  return d.getTime() === t.getTime();
}

function renderWeek(wi) {
  const w = weeks[wi];
  let html = `<div class="motive-bar"><strong>Week ${wi+1} Focus:</strong> ${w.focus}</div><div class="days-grid">`;
  w.days.forEach((d,di)=>{
    const done = state[dk(wi,di)];
    const today = isToday(d.date);
    const note = state[nk(wi,di)]||'';
    const allKeys = ['m','p','c'].flatMap(s=>(d.tasks[s]||[]).map((_,ti)=>gk(wi,di,s,ti)));
    const doneCount = allKeys.filter(k=>state[k]).length;
    const isReview = d.isReview;
    const prevAttempts = (state[qk(wi)]||[]);

    html += `<div class="day-card ${today?'today':''} ${isReview?'review-day':''} ${done?'completed':''}" id="dc-${wi}-${di}">
      <div class="day-header" onclick="toggleDay(${wi},${di})">
        <div class="day-left">
          <div class="day-num">${String(di+1+wi*7).padStart(2,'0')}</div>
          <div class="day-info">
            <div class="day-name">${d.name} ${today?'<span class="today-badge">TODAY</span>':''} ${isReview?'<span class="review-badge">REVIEW + QUIZ</span>':''}</div>
            <div class="day-date">${d.date} · ${doneCount}/${allKeys.length} tasks</div>
            <div class="day-subjects">
              <span class="subj-tag m">MATHS 3.5h</span>
              <span class="subj-tag p">PHYSICS 3h</span>
              <span class="subj-tag c">CHEM 2.5h</span>
              ${isReview?'<span class="subj-tag quiz">AI QUIZ</span>':''}
            </div>
          </div>
        </div>
        <div class="day-actions">
          <button class="complete-btn ${done?'done':''}" onclick="toggleDone(event,${wi},${di})">
            <svg viewBox="0 0 24 24" fill="none" stroke="${done?'#000':'var(--muted)'}" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><polyline points="20 6 9 17 4 12"/></svg>
          </button>
          <span class="chevron">▾</span>
        </div>
      </div>
      <div class="day-tasks">
        <div class="tasks-grid">`;

    ['m','p','c'].forEach(s=>{
      html += `<div class="subject-block"><div class="subject-block-title ${s}">${LABELS[s]}</div>`;
      (d.tasks[s]||[]).forEach((task,ti)=>{
        const k = gk(wi,di,s,ti), chk = state[k];
        html += `<div class="task-item">
          <input type="checkbox" class="task-check" ${chk?'checked':''} onchange="toggleTask('${k}',this)">
          <span class="task-text ${chk?'done':''}">${task}</span>
        </div>`;
      });
      html += `</div>`;
    });

    html += `</div>`;

    // QUIZ SECTION for review days
    if(isReview) {
      html += `<div class="quiz-section">
        <div class="quiz-header">
          <div>
            <div class="quiz-title">⚡ WEEK ${wi+1} REVIEW QUIZ</div>
            <div class="quiz-subtitle">30 AI-generated questions from what you studied this week</div>
          </div>
          <button class="start-quiz-btn" onclick="startQuiz(${wi})">START QUIZ →</button>
        </div>`;
      if(prevAttempts.length > 0) {
        html += `<div class="quiz-history"><div class="quiz-history-title">// Previous Attempts</div>`;
        prevAttempts.slice(-3).reverse().forEach(a=>{
          const pct = Math.round(a.score/a.total*100);
          html += `<div class="quiz-attempt">
            <div><span class="attempt-score">${a.score}/${a.total}</span> <span style="font-size:0.72rem;color:var(--muted);">(${pct}%)</span></div>
            <div class="attempt-date">${a.date}</div>
          </div>`;
        });
        html += `</div>`;
      }
      html += `</div>`;
    }

    html += `<div class="day-notes">
        <div class="notes-label">// NOTES</div>
        <textarea class="notes-input" placeholder="Write your notes, struggles, or wins..." onchange="saveNote(${wi},${di},this.value)">${note}</textarea>
      </div>
    </div></div>`;
  });
  html += '</div>';
  return html;
}

function toggleDay(wi,di) {
  const c = document.getElementById(`dc-${wi}-${di}`);
  c.classList.toggle('open');
}

function toggleDone(e,wi,di) {
  e.stopPropagation();
  state[dk(wi,di)] = !state[dk(wi,di)];
  save(); renderAll();
}

function toggleTask(k,el) {
  state[k] = el.checked; save(); calcStats();
  const lbl = el.nextElementSibling;
  if(lbl) lbl.classList.toggle('done', el.checked);
}

function saveNote(wi,di,val) { state[nk(wi,di)]=val; save(); }

function showWeek(wi) {
  currentWeek = wi;
  document.querySelectorAll('.tab').forEach((t,i)=>t.classList.toggle('active',i===wi));
  document.querySelectorAll('.week-panel').forEach((p,i)=>p.classList.toggle('active',i===wi));
}

function renderAll() {
  // Tabs
  document.getElementById('tabs').innerHTML = weeks.map((w,i)=>`<button class="tab ${i===currentWeek?'active':''}" onclick="showWeek(${i})">${w.title}</button>`).join('');
  // Panels
  document.getElementById('week-panels').innerHTML = weeks.map((w,wi)=>`<div class="week-panel ${wi===currentWeek?'active':''}" id="wp-${wi}">${renderWeek(wi)}</div>`).join('');
  calcStats();
}

  quizWeekIndex = wi;
  quizQuestions = [];
  quizCurrent = 0;
  quizScore = 0;
  quizSubScores = {Maths:0,MathsT:0,Physics:0,PhysicsT:0,Chemistry:0,ChemistryT:0};
  document.getElementById('quizModalTitle').textContent = `WEEK ${wi+1} REVIEW QUIZ`;
  document.getElementById('quizModal').classList.add('open');
  showLoading();
  await generateQuestions(wi);
}

function showLoading() {
  document.getElementById('quizContent').innerHTML = `
    <div class="quiz-loading">
      <div class="spinner"></div>
      <div class="loading-text">Generating 30 questions from Week ${quizWeekIndex+1} topics...</div>
      <div class="loading-text" style="margin-top:8px;font-size:0.7rem;">This takes about 15 seconds ⚡</div>
    </div>`;
}

async function generateQuestions(wi) {
  const w = weeks[wi];
  const topicStr = [
    `Maths topics: ${w.topics.m.join(', ')}`,
    `Physics topics: ${w.topics.p.join(', ')}`,
    `Chemistry topics: ${w.topics.c.join(', ')}`
  ].join('\n');

  const prompt = `You are a CBSE Class 11/12 exam question generator. Generate exactly 30 multiple choice questions based on these topics:

${topicStr}

Rules:
- 10 questions each from Maths, Physics, Chemistry
- Each question must have exactly 4 options (A, B, C, D)
- Mark the correct answer
- Add a brief explanation (1-2 sentences)
- Mix difficulty: 3 easy, 5 medium, 2 hard per subject
- Questions must be specific and testable, not vague

Respond ONLY with a JSON array. No preamble, no markdown, no backticks. Just the raw JSON array like this:
[{"subject":"Maths","question":"...","options":["A. ...","B. ...","C. ...","D. ..."],"correct":0,"explanation":"..."},...]

correct is the 0-based index of the correct option.`;

  try {
    const res = await fetch('https://api.anthropic.com/v1/messages', {
      method:'POST',
      headers:{'Content-Type':'application/json'},
      body: JSON.stringify({
        model:'claude-sonnet-4-20250514',
        max_tokens:4000,
        messages:[{role:'user',content:prompt}]
      })
    });
    const data = await res.json();
    const text = data.content?.find(b=>b.type==='text')?.text || '[]';
    const clean = text.replace(/```json|```/g,'').trim();
    quizQuestions = JSON.parse(clean);
    if(!Array.isArray(quizQuestions)||quizQuestions.length===0) throw new Error('bad data');
    showQuestion();
  } catch(err) {
    document.getElementById('quizContent').innerHTML = `
      <div style="text-align:center;padding:40px 0;">
        <div style="font-size:2rem;margin-bottom:12px;">⚠️</div>
        <div style="font-family:'DM Mono',monospace;font-size:0.8rem;color:var(--muted);margin-bottom:20px;">Failed to generate questions. Check your internet and try again.</div>
        <button class="start-quiz-btn" onclick="startQuiz(${wi})">RETRY</button>
      </div>`;
  }
}

function showQuestion() {
  if(quizCurrent >= quizQuestions.length) { showResults(); return; }
  const q = quizQuestions[quizCurrent];
  const prog = Math.round((quizCurrent/quizQuestions.length)*100);
  quizAnswered = false;

  document.getElementById('quizContent').innerHTML = `
    <div class="quiz-progress-bar"><div class="quiz-progress-fill" style="width:${prog}%"></div></div>
    <div class="quiz-meta">
      <span class="quiz-subject-tag ${q.subject}">${q.subject}</span>
      <span>${quizCurrent+1} / ${quizQuestions.length}</span>
    </div>
    <div class="question-text">${q.question}</div>
    <div class="options-grid" id="optionsGrid">
      ${q.options.map((opt,i)=>`<button class="option-btn" onclick="answerQ(${i})" id="opt-${i}">${opt}</button>`).join('')}
    </div>
    <div id="explanation" style="display:none"></div>
    <div style="display:flex;justify-content:flex-end;margin-top:8px;">
      <button class="next-btn" id="nextBtn" style="display:none" onclick="nextQuestion()">
        ${quizCurrent+1 < quizQuestions.length ? 'NEXT →' : 'SEE RESULTS →'}
      </button>
    </div>`;
}

function answerQ(chosen) {
  if(quizAnswered) return;
  quizAnswered = true;
  const q = quizQuestions[quizCurrent];
  const correct = q.correct;
  const isRight = chosen === correct;

  if(isRight) {
    quizScore++;
    quizSubScores[q.subject]++;
  }
  quizSubScores[q.subject+'T'] = (quizSubScores[q.subject+'T']||0)+1;

  q.options.forEach((_,i)=>{
    const btn = document.getElementById(`opt-${i}`);
    btn.disabled = true;
    if(i===correct) btn.classList.add(isRight&&i===chosen?'correct':'reveal');
    else if(i===chosen&&!isRight) btn.classList.add('wrong');
  });

  document.getElementById('explanation').innerHTML = `
    <div class="explanation">
      <strong>${isRight?'✓ Correct!':'✗ Wrong'}</strong> — ${q.explanation}
    </div>`;
  document.getElementById('explanation').style.display = 'block';
  document.getElementById('nextBtn').style.display = 'block';
}

function nextQuestion() { quizCurrent++; showQuestion(); }

function showResults() {
  const pct = Math.round(quizScore/quizQuestions.length*100);
  const color = pct>=90?'var(--chem)':pct>=70?'var(--maths)':'#ff6666';
  const msg = pct>=90?'BEAST MODE. You clearly know your stuff 🔥':
               pct>=70?'Solid performance! Keep pushing for that 100% 💪':
               pct>=50?'Good effort. Review the topics you missed and retake!':
               'Needs work bro. Go back and revise those topics, then come back stronger!';

  // Save attempt
  const attempts = state[qk(quizWeekIndex)]||[];
  attempts.push({score:quizScore,total:quizQuestions.length,date:new Date().toLocaleDateString('en-IN',{day:'numeric',month:'short',year:'numeric'})});
  state[qk(quizWeekIndex)] = attempts;
  save();

  document.getElementById('quizContent').innerHTML = `
    <div class="quiz-results">
      <div class="result-score" style="color:${color}">${pct}%</div>
      <div class="result-label">${quizScore} / ${quizQuestions.length} CORRECT</div>
      <div class="result-breakdown">
        <div class="result-sub">
          <div class="result-sub-score m">${quizSubScores['Maths']||0}/${quizSubScores['MathsT']||0}</div>
          <div class="result-sub-label">Maths</div>
        </div>
        <div class="result-sub">
          <div class="result-sub-score p">${quizSubScores['Physics']||0}/${quizSubScores['PhysicsT']||0}</div>
          <div class="result-sub-label">Physics</div>
        </div>
        <div class="result-sub">
          <div class="result-sub-score c">${quizSubScores['Chemistry']||0}/${quizSubScores['ChemistryT']||0}</div>
          <div class="result-sub-label">Chemistry</div>
        </div>
      </div>
      <div class="result-msg">${msg}</div>
      <button class="retake-btn" onclick="startQuiz(${quizWeekIndex})">↺ RETAKE QUIZ</button>
      <button class="next-btn" onclick="closeQuiz()">CLOSE</button>
    </div>`;

  renderAll(); // refresh to show attempt history
}

function closeQuiz() {
  document.getElementById('quizModal').classList.remove('open');
}

// ============================================================
// INIT
// ============================================================
updateCountdown();
setInterval(updateCountdown, 60000);

// Find current week based on today
let startWeek = 0;
weeks.forEach((w,wi)=>{
  w.days.forEach(d=>{ if(isToday(d.date)) startWeek=wi; });
});
currentWeek = startWeek;
renderAll();

// Auto-open today
setTimeout(()=>{
  weeks.forEach((w,wi)=>w.days.forEach((d,di)=>{
    if(isToday(d.date)) {
      const c = document.getElementById(`dc-${wi}-${di}`);
      if(c){ c.classList.add('open'); c.scrollIntoView({behavior:'smooth',block:'center'}); }
    }
  }));
},200);
</script>
